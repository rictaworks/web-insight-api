# Registers :ja with I18n.available_locales so RailsAdmin
# (config/initializers/rails_admin.rb) can force I18n.locale = :ja without
# raising I18n::InvalidLocale. RailsAdmin's own UI chrome (menus, buttons,
# filters, validation messages, etc.) is translated by the rails_admin-i18n
# gem; the activerecord.models/attributes entries below cover the
# model/field labels that gem does not translate (RailsAdmin auto-discovers
# every ActiveRecord model, so all of them are listed here for a fully
# Japanese admin UI).
ja:
  hello: "こんにちは"

  errors:
    format: "%{attribute}%{message}"
    messages:
      blank: "を入力してください"
      taken: "はすでに存在します"
      invalid: "は不正な値です"
      not_a_number: "は数値で入力してください"
      not_an_integer: "は整数で入力してください"
      greater_than_or_equal_to: "は%{count}以上の値にしてください"
      less_than_or_equal_to: "は%{count}以下の値にしてください"

  activerecord:
    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
      models:
        bot_rule:
          attributes:
            base:
              cannot_delete_last_rule: "最後の1件は削除できません。少なくとも1件のボットルールが必要です"

    models:
      age_group: "年齢層"
      ai_recommendation: "AIレコメンデーション"
      alert_log: "アラート発生履歴"
      alert_metric_type: "アラート指標種別"
      alert_rule: "アラートルール"
      bot_rule: "ボットルール"
      channel_type: "チャネル種別"
      cwv_metric_type: "Core Web Vitals指標種別"
      daily_ai_usage: "AI利用状況（日次）"
      event: "イベント"
      event_type: "イベント種別"
      funnel: "ファネル"
      recommendation_category: "レコメンデーションカテゴリ"
      session: "セッション"
      site: "サイト"
      user: "ユーザー"
      web_vital: "Web Vitals"


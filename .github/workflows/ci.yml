name: CI

# PR 必須チェック用のワークフロー。main への push と main 宛て PR で実行する。
# （チェックを「必須」にするには main ブランチの Branch protection で
#  backend / frontend / e2e を Required status checks に指定する。）
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで新しい push があれば進行中の run をキャンセルして無駄を省く。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (RuboCop + RSpec)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.7
          bundler-cache: true
          working-directory: backend

      - name: RuboCop
        run: bundle exec rubocop

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: RSpec
        run: bundle exec rspec

  frontend:
    name: Frontend (ESLint + Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Jest
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright tests
        run: npm run test:e2e
